# Upstream resmi: https://github.com/dresar/gambar-ai-kreatif
# Fork: merge otomatis dari dresar setiap Senin, atau Run workflow manual.
# Variable UPSTREAM_REPO opsional (override URL lain).

name: Sync upstream

env:
  DEFAULT_UPSTREAM: https://github.com/dresar/gambar-ai-kreatif.git

on:
  workflow_dispatch:
    inputs:
      upstream_url:
        description: "Override URL upstream (kosong = dresar/gambar-ai-kreatif)"
        required: false
        default: ""
  schedule:
    - cron: "0 6 * * 1"

concurrency:
  group: sync-upstream-${{ github.repository }}
  cancel-in-progress: true

jobs:
  sync:
    name: Merge upstream → ${{ github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Jadwal mingguan: hanya fork (bukan repo utama dresar)
    if: github.event_name == 'workflow_dispatch' || github.repository != 'dresar/gambar-ai-kreatif'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upstream URL
        id: up
        run: |
          URL="${{ inputs.upstream_url }}"
          [ -z "$URL" ] && URL="${{ vars.UPSTREAM_REPO }}"
          [ -z "$URL" ] && URL="${{ env.DEFAULT_UPSTREAM }}"
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "::notice::Upstream $URL"

      - name: Merge dari dresar/gambar-ai-kreatif
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="${{ github.event.repository.default_branch }}"
          git checkout "$BRANCH"
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "${{ steps.up.outputs.url }}"
          git fetch upstream "$BRANCH"
          git merge "upstream/$BRANCH" -m "chore(sync): upstream $BRANCH" --no-edit
          git push origin "$BRANCH"
